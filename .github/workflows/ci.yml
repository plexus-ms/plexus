name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  # Check → test → build & push image.
  # The image is built only on pushs, not on PRs.
  ci:
    uses: plexus-ms/ci-cd/.github/workflows/ci.yml@v0.4
    with:
      app: website
      build: ${{ github.event_name == 'push' }}

  # Push to main → deploy to prod via the stateless deploy verb.
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: plexus-ms/ci-cd/.github/workflows/deploy.yml@v0.4
    with:
      app: website
      image-ref: ${{ needs.ci.outputs.image-ref }}
      host: plexus@ddb01.plexus-ms.org
    secrets:
      ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}

  # Temporary second app verifying multi-app-per-host port binding (§ 5.4 PLX).
  ci-my-app:
    uses: plexus-ms/ci-cd/.github/workflows/ci.yml@v0.4
    with:
      app: my-app
      build: ${{ github.event_name == 'push' }}

  deploy-my-app:
    needs: ci-my-app
    if: github.ref == 'refs/heads/main'
    uses: plexus-ms/ci-cd/.github/workflows/deploy.yml@v0.4
    with:
      app: my-app
      image-ref: ${{ needs.ci-my-app.outputs.image-ref }}
      host: plexus@ddb01.plexus-ms.org
    secrets:
      ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
