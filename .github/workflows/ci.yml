name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  # Check → test → build & push image.
  # The image is built only on pushs, not on PRs.
  ci:
    uses: plexus-ms/ci-cd/.github/workflows/ci.yml@v0.2
    with:
      app: website
      build: ${{ github.event_name == 'push' }}

  # Push to main → deploy to prod via the stateless deploy verb.
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: plexus-ms/ci-cd/.github/workflows/deploy.yml@v0.2
    with:
      app: website
      image-ref: ${{ needs.ci.outputs.image-ref }}
      host: plexus@ddb01.plexus-ms.org
    secrets:
      ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
