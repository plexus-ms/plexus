plexus_tenant: plexus

# Unprivileged user that owns app dirs and runs the deploy verb (via CI SSH).
plexus_deploy_user: plexus
plexus_deploy_root: /opt/stacks

# Attempt to pull + start apps during provisioning. Safe to leave true: a missing
# image (very first bring-up, before CI has pushed) is reported, not fatal.
plexus_up: true

# Apps on this host.
# compose.yml is copied from this monorepo's apps/<name>/ (single
# source of truth); `image` is the last-known-good ref pulled on a restore.
# Add entries as you add apps, e.g.:
#   - name: my-app
#     domain: my-app.example.org
#     image: ghcr.io//my-app:latest
#     port: 3000
plexus_apps:
  - name: website
    domain: plexus-ms.org
    image: ghcr.io/plexus-ms/website:ec0873891016469810a0bffe1e49a6382d37b889
    port: 3000
    secrets:
      REVALIDATE_TOKEN: "{{ lookup('community.general.onepassword', 'website-revalidate', field='credential', vault='plexus') }}"


# Base packages the host needs
plexus_base_packages:
  - ca-certificates
  - curl
  - gnupg
  - python3-debian # required by deb822_repository module
  - sudo
  - ufw
  - fail2ban
  - unattended-upgrades
  - acl

# Secrets
plexus_deploy_pubkey: "{{ lookup('env', 'DEPLOY_PUBKEY') | default('', true) }}"
plexus_operator_pubkey: "{{ lookup('env', 'OPERATOR_PUBKEY') | default('', true) }}"
plexus_ghcr_user: "{{ lookup('env', 'GHCR_USER') | default('', true) }}"
plexus_ghcr_token: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"
