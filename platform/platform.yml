---
# This playbook reproduces the plexus operations platform from scratch:
#
#   ansible-galaxy collection install -r requirements.yml
#   ./ansible-playbookw platform.yml
#
- name: Provisioning the plexus operations platform
  hosts: plexus
  become: true
  roles:
    - plexus.itops.base
    - plexus.itops.docker
    - plexus.itops.caddy
    - plexus.itops.deploy
